services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: promptops
      POSTGRES_PASSWORD: promptops
      POSTGRES_DB: promptops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://promptops:promptops@postgres:5432/promptops
      DATABASE_URL_SYNC: postgresql://promptops:promptops@postgres:5432/promptops
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DEV_AUTH_EMAIL: ${DEV_AUTH_EMAIL:-dev@local.test}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    command: scripts/worker-entrypoint.sh
    environment:
      DATABASE_URL: postgresql+asyncpg://promptops:promptops@postgres:5432/promptops
      DATABASE_URL_SYNC: postgresql://promptops:promptops@postgres:5432/promptops
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DEV_AUTH_EMAIL: ${DEV_AUTH_EMAIL:-dev@local.test}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
